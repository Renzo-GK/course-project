<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Book a Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Meeting Rooms</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/my-bookings.html">My Bookings</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Book a Room</h2>
        <form id="bookingForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Room</label>
                <select id="roomId" class="form-select" required>
                    <option value="">Loading rooms...</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Start Date & Time</label>
                <input type="datetime-local" id="startDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">End Date & Time</label>
                <input type="datetime-local" id="endDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" id="subject" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="description" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Book</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <script>
        // Загружаем список комнат
        fetch('/api/rooms')
            .then(res => res.json())
            .then(rooms => {
                const select = document.getElementById('roomId');
                select.innerHTML = '';
                rooms.forEach(room => {
                    const option = document.createElement('option');
                    option.value = room.id;
                    option.textContent = room.name + ' (Capacity: ' + room.capacity + ')';
                    select.appendChild(option);
                });
            })
            .catch(err => {
                document.getElementById('roomId').innerHTML = '<option value="">Failed to load rooms</option>';
                console.error(err);
            });

        // Обработка отправки формы
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const roomId = document.getElementById('roomId').value;
            const startDateTime = document.getElementById('startDateTime').value;
            const endDateTime = document.getElementById('endDateTime').value;
            const subject = document.getElementById('subject').value;
            const description = document.getElementById('description').value;

            // Пока используем userId=1 (admin) для теста
            const userId = 1;

            const payload = {
                roomId: parseInt(roomId),
                userId: userId,
                startDateTime: startDateTime,
                endDateTime: endDateTime,
                subject: subject,
                description: description
            };

            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => { throw new Error(text); });
                }
                return res.json();
            })
            .then(data => {
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Booking created successfully!</div>';
                document.getElementById('bookingForm').reset();
            })
            .catch(err => {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Error: ' + err.message + '</div>';
            });
        });
    </script>
</body>
</html>
