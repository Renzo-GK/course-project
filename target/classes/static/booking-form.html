<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Бронирование комнаты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-door-open"></i> Переговорные комнаты</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/"><i class="bi bi-house"></i> Главная</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/my-bookings.html"><i class="bi bi-calendar-check"></i> Мои</a>
                <a class="btn btn-outline-light btn-sm" href="/logout"><i class="bi bi-box-arrow-right"></i> Выйти</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2><i class="bi bi-plus-circle"></i> Бронирование комнаты</h2>
        <form id="bookingForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Комната</label>
                <select id="roomId" class="form-select" required>
                    <option value="">Загрузка...</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Дата и время начала</label>
                <input type="datetime-local" id="startDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Дата и время окончания</label>
                <input type="datetime-local" id="endDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Тема</label>
                <input type="text" id="subject" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea id="description" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Забронировать</button>
            <a href="/" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Отмена</a>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">Успешно!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        fetch('/api/rooms')
            .then(res => res.json())
            .then(rooms => {
                const select = document.getElementById('roomId');
                select.innerHTML = '';
                rooms.forEach(room => {
                    const option = document.createElement('option');
                    option.value = room.id;
                    option.textContent = room.name + ' (Вместимость: ' + room.capacity + ')';
                    select.appendChild(option);
                });
            })
            .catch(err => {
                document.getElementById('roomId').innerHTML = '<option value="">Ошибка загрузки</option>';
            });

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const roomId = document.getElementById('roomId').value;
            const startDateTime = document.getElementById('startDateTime').value;
            const endDateTime = document.getElementById('endDateTime').value;
            const subject = document.getElementById('subject').value;
            const description = document.getElementById('description').value;
            const userId = 1;
            const payload = {
                roomId: parseInt(roomId),
                userId: userId,
                startDateTime: startDateTime,
                endDateTime: endDateTime,
                subject: subject,
                description: description
            };

            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) return res.text().then(text => { throw new Error(text); });
                return res.json();
            })
            .then(data => {
                var toastEl = document.getElementById('liveToast');
                var toast = new bootstrap.Toast(toastEl);
                document.getElementById('toastMessage').textContent = 'Бронирование успешно создано!';
                toastEl.classList.remove('bg-danger');
                toastEl.classList.add('bg-success');
                toast.show();
                document.getElementById('bookingForm').reset();
            })
            .catch(err => {
                var toastEl = document.getElementById('liveToast');
                var toast = new bootstrap.Toast(toastEl);
                document.getElementById('toastMessage').textContent = 'Ошибка: ' + err.message;
                toastEl.classList.remove('bg-success');
                toastEl.classList.add('bg-danger');
                toast.show();
            });
        });
    </script>
</body>
</html>
