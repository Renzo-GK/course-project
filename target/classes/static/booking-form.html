<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Бронирование комнаты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Переговорные комнаты</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/">Главная</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/my-bookings.html">Мои бронирования</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">Выйти</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Бронирование комнаты</h2>
        <form id="bookingForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Комната</label>
                <select id="roomId" class="form-select" required>
                    <option value="">Загрузка комнат...</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Дата и время начала</label>
                <input type="datetime-local" id="startDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Дата и время окончания</label>
                <input type="datetime-local" id="endDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Тема</label>
                <input type="text" id="subject" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea id="description" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Забронировать</button>
            <a href="/" class="btn btn-secondary">Отмена</a>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <script>
        fetch('/api/rooms')
            .then(res => res.json())
            .then(rooms => {
                const select = document.getElementById('roomId');
                select.innerHTML = '';
                rooms.forEach(room => {
                    const option = document.createElement('option');
                    option.value = room.id;
                    option.textContent = room.name + ' (Вместимость: ' + room.capacity + ')';
                    select.appendChild(option);
                });
            })
            .catch(err => {
                document.getElementById('roomId').innerHTML = '<option value="">Не удалось загрузить комнаты</option>';
                console.error(err);
            });

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const roomId = document.getElementById('roomId').value;
            const startDateTime = document.getElementById('startDateTime').value;
            const endDateTime = document.getElementById('endDateTime').value;
            const subject = document.getElementById('subject').value;
            const description = document.getElementById('description').value;

            const userId = 1;

            const payload = {
                roomId: parseInt(roomId),
                userId: userId,
                startDateTime: startDateTime,
                endDateTime: endDateTime,
                subject: subject,
                description: description
            };

            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => { throw new Error(text); });
                }
                return res.json();
            })
            .then(data => {
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Бронирование успешно создано!</div>';
                document.getElementById('bookingForm').reset();
            })
            .catch(err => {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Ошибка: ' + err.message + '</div>';
            });
        });
    </script>
</body>
</html>
