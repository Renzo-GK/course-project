<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои бронирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Переговорные комнаты</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/">Главная</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/booking-form.html">Новое бронирование</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">Выйти</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Мои бронирования</h2>
        <div id="bookings-list" class="mt-4">
            <div class="text-center"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
    </div>

    <script>
        const userId = 1;

        function loadBookings() {
            fetch('/api/bookings/user/' + userId)
                .then(res => {
                    if (!res.ok) throw new Error('Не удалось загрузить бронирования');
                    return res.json();
                })
                .then(bookings => {
                    const container = document.getElementById('bookings-list');
                    if (bookings.length === 0) {
                        container.innerHTML = '<div class="alert alert-info">Бронирований не найдено.</div>';
                        return;
                    }
                    let html = `<table class="table table-striped">
                        <thead>
                            <tr><th>Комната</th><th>Начало</th><th>Окончание</th><th>Тема</th><th>Статус</th><th>Действие</th></tr>
                        </thead><tbody>`;
                    bookings.forEach(b => {
                        html += `<tr>
                            <td>${b.roomName}</td>
                            <td>${new Date(b.startDateTime).toLocaleString()}</td>
                            <td>${new Date(b.endDateTime).toLocaleString()}</td>
                            <td>${b.subject || '-'}</td>
                            <td><span class="badge bg-primary">${b.status}</span></td>
                            <td>
                                ${b.status === 'SCHEDULED' ? `<button class="btn btn-danger btn-sm" onclick="cancelBooking(${b.id})">Отменить</button>` : '-'}
                            </td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('bookings-list').innerHTML = '<div class="alert alert-danger">Ошибка: ' + err.message + '</div>';
                });
        }

        function cancelBooking(bookingId) {
            if (!confirm('Отменить бронирование?')) return;
            fetch('/api/bookings/' + bookingId + '?userId=' + userId, {
                method: 'DELETE'
            })
            .then(res => {
                if (!res.ok) throw new Error('Не удалось отменить');
                loadBookings();
            })
            .catch(err => alert('Ошибка: ' + err.message));
        }

        loadBookings();
    </script>
</body>
</html>
