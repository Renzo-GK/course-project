<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Переговорные комнаты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Переговорные комнаты</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/booking-form.html">Бронировать</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/my-bookings.html">Мои бронирования</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/login">Вход</a>
                <a class="btn btn-outline-light btn-sm" href="/register">Регистрация</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Переговорные комнаты</h2>
        <hr>
        <div id="rooms-container" class="row mt-4">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p>Загрузка комнат...</p>
            </div>
        </div>
    </div>
    <script>
        fetch('/api/rooms')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('rooms-container');
                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="alert alert-warning">Нет доступных комнат</div>';
                    return;
                }
                data.forEach(room => {
                    container.innerHTML +=
                    '<div class="col-md-4 mb-3">' +
                        '<div class="card">' +
                            '<div class="card-body">' +
                                '<h5 class="card-title">' + room.name + '</h5>' +
                                '<p><strong>Вместимость:</strong> ' + room.capacity + '</p>' +
                                '<p><strong>Оборудование:</strong> ' + (room.equipment || '-') + '</p>' +
                                '<p><strong>Местоположение:</strong> ' + room.location + '</p>' +
                                '<span class="badge ' + (room.available ? 'bg-success' : 'bg-danger') + '">' +
                                    (room.available ? 'Доступна' : 'Недоступна') +
                                '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                });
            })
            .catch(error => {
                document.getElementById('rooms-container').innerHTML =
                    '<div class="alert alert-danger">Ошибка: ' + error.message + '</div>';
            });
    </script>
</body>
</html>
