<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meeting Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Meeting Rooms</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/login">Login</a>
                <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Meeting Rooms</h2>
        <div class="row mt-4">
            <div class="col-md-4 mb-3" th:each="room : ">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="">Room Name</h5>
                        <p class="card-text">
                            <strong>Capacity:</strong> <span th:text="">0</span><br>
                            <strong>Equipment:</strong> <span th:text="">-</span><br>
                            <strong>Location:</strong> <span th:text="">-</span><br>
                            <span class="badge bg-success" th:if="">Available</span>
                            <span class="badge bg-danger" th:unless="">Not Available</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <p>Total rooms: <span th:text="">0</span></p>
        </div>
    </div>
</body>
</html>
