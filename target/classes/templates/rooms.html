<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meeting Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Meeting Rooms</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/login">Login</a>
                <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Meeting Rooms</h2>
        <hr>

        <div class="row">
            <div th:each="room : " class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="">Room Name</h5>
                        <p><strong>Capacity:</strong> <span th:text="">0</span></p>
                        <p><strong>Equipment:</strong> <span th:text="">-</span></p>
                        <p><strong>Location:</strong> <span th:text="">-</span></p>
                        <span class="badge bg-success" th:if="">Available</span>
                        <span class="badge bg-danger" th:unless="">Not Available</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
