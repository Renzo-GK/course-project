<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Meeting Rooms</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/bookings/create">New Booking</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>My Bookings</h2>
        <table class="table table-striped mt-4">
            <thead>
                <tr>
                    <th>Room</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Subject</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ">
                    <td th:text="">Room</td>
                    <td th:text="">Start</td>
                    <td th:text="">End</td>
                    <td th:text="">Subject</td>
                    <td><span class="badge bg-primary" th:text="">Status</span></td>
                    <td>
                        <a th:href="'/api/bookings/' +  + '?userId=' + " 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Cancel this booking?')">Cancel</a>
                    </td>
                </tr>
                <tr th:if="">
                    <td colspan="6" class="text-center">No bookings found</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
