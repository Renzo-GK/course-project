<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Meeting Rooms</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/bookings/my">My Bookings</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Create Booking</h2>
        <form action="/bookings/create" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Room</label>
                <select name="roomId" class="form-select" required>
                    <option th:each="room : " th:value="" th:text=""></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Start Date & Time</label>
                <input type="datetime-local" name="startDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">End Date & Time</label>
                <input type="datetime-local" name="endDateTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Book</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
